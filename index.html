<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalCalm - Home</title>
    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img
              src="assets/img/logo.png"
              alt="Logo Total Calm"
              class="me-2 rounded-circle img-fluid"
              style="max-width: 70px"
            />
            <span>TotalCalm</span>
          </a>
          <!-- Botón hamburguesa -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <!-- Menú colapsable -->
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="carrito.html">
                  Carrito <span id="contador" class="badge bg-primary">0</span>
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contacto.html">Contacto</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-4 mt-5 pt-5">
      <!-- Cards de productos -->
      <section class="row mt-5">
        <article class="col-md-4 col-sm-6 mb-4">
          <div class="card h-100">
            <img
              src="assets/img/leggings.jpg"
              class="card-img-top"
              alt="Leggings Yoga"
            />
            <div class="card-body">
              <h5 class="card-title">Leggings Yoga</h5>
              <p class="card-text">$19.990</p>
              <a
                href="detalle.html?producto=leggings"
                class="btn btn-outline-primary"
                >Ver más</a
              >
            </div>
          </div>
        </article>

        <article class="col-md-4 col-sm-6 mb-4">
          <div class="card h-100">
            <img
              src="assets/img/mat-yoga.jpg"
              class="card-img-top"
              alt="Mat Yoga"
            />
            <div class="card-body">
              <h5 class="card-title">Mat Yoga Antideslizante</h5>
              <p class="card-text">$24.990</p>
              <a
                href="detalle.html?producto=mat"
                class="btn btn-outline-primary"
                >Ver más</a
              >
            </div>
          </div>
        </article>

        <article class="col-md-4 col-sm-6 mb-4">
          <div class="card h-100">
            <img
              src="assets/img/polera-yoga.jpg"
              class="card-img-top"
              alt="Polera Yoga"
            />
            <div class="card-body">
              <h5 class="card-title">Polera Yoga</h5>
              <p class="card-text">$14.990</p>
              <a
                href="detalle.html?producto=polera"
                class="btn btn-outline-primary"
                >Ver más</a
              >
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer class="bg-light text-center p-3 mt-4">
      <small
        >© 2026 TotalCalm.cl - Tienda de ropa deportiva para yoga y
        pilates</small
      >
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
